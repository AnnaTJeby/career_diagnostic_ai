<!DOCTYPE html>
<html>

<head>
    <title>Resume Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="nav">
        <a href="resume.html">Resume</a>
        <a href="skillgap.html">Skill Gap</a>
        <a href="interview.html">Interview</a>
        <a href="dashboard.html">Home</a>
    </div>

    <h2>Resume Analyzer</h2>

    <div class="form-group">
        <label>Upload Your Resume (PDF, DOCX, or TXT)</label>
        <div id="drop-zone" class="upload-zone" onclick="document.getElementById('resumeFile').click()">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <p>Drag and drop your file here, or click to browse</p>
            <div id="file-name" class="file-info" style="display: none;"></div>
        </div>
        <input type="file" id="resumeFile" accept=".pdf,.doc,.docx,.txt">
    </div>

    <button id="btn-analyze" onclick="handleAnalyzeResume()">
        <span>Analyze Resume</span>
    </button>

    <div id="skills"></div>

    <script src="script.js"></script>

</body>

</html>
